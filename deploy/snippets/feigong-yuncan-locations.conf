# =============================================================
# 非攻云餐 — 独立路径 location 块（由 install-nginx-yuncan.sh 注入）
# 安装：include /etc/nginx/snippets/feigong-yuncan-locations.conf;
#
# 不修改考勤/报价默认站点；仅新增以下路径：
#   /yuncan/          员工/商家 Flutter Web
#   /yuncan-admin/    管理后台
#   /yuncan-api/      API → 127.0.0.1:3003/api/
#   /yuncan-uploads/  上传文件反代
#   /downloads/       APK 等静态下载（与报价 App 同模式）
# =============================================================

# ---------- Flutter Web ----------
location /yuncan/ {
    alias /opt/feigong-yuncan/web/yuncan/;
    index index.html;
    try_files $uri $uri/ /yuncan/index.html;
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
}

location = /yuncan {
    return 301 /yuncan/;
}

# ---------- admin-web ----------
location /yuncan-admin/ {
    alias /opt/feigong-yuncan/web/yuncan-admin/;
    index index.html;
    try_files $uri $uri/ /yuncan-admin/index.html;
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
}

location = /yuncan-admin {
    return 301 /yuncan-admin/;
}

# ---------- API（3003，不占用 3001/3002） ----------
location /yuncan-api/uploads/ {
    proxy_pass         http://127.0.0.1:3003/uploads/;
    proxy_set_header   Host $host;
}

location /yuncan-api/ {
    proxy_pass         http://127.0.0.1:3003/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;
}

# ---------- 上传直链（可选，与 yuncan-api/uploads 二选一） ----------
location /yuncan-uploads/ {
    proxy_pass         http://127.0.0.1:3003/uploads/;
    proxy_set_header   Host $host;
}

# ---------- APK / 安装包下载（报价 App 同款） ----------
location ^~ /downloads/ {
    alias /opt/feigong-yuncan/downloads/;
    autoindex off;
    add_header Content-Disposition "attachment";
    add_header Cache-Control "public, max-age=300";
    try_files $uri =404;
}
