# =============================================================
# 非攻云餐 — 独立域名 server（yuncan.pheako.com）
# 安装：/etc/nginx/sites-available/feigong-yuncan-domain.conf
#
# IP 共享入口请用 snippets/feigong-yuncan-locations.conf 注入默认站点
# 本文件提供域名根路径访问（/ /admin/ /api/ /downloads/）
# =============================================================

# HTTP → HTTPS（证书就绪后取消注释）
# server {
#     listen 80;
#     server_name yuncan.pheako.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;
    server_name yuncan.pheako.com;

    # ssl_certificate     /etc/nginx/ssl/yuncan.pheako.com.pem;
    # ssl_certificate_key /etc/nginx/ssl/yuncan.pheako.com.key;

    client_max_body_size 20m;

    access_log /opt/feigong-yuncan/logs/nginx-domain-access.log;
    error_log  /opt/feigong-yuncan/logs/nginx-domain-error.log warn;

    location /api/ {
        proxy_pass         http://127.0.0.1:3003/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass         http://127.0.0.1:3003/uploads/;
        proxy_set_header   Host $host;
    }

    location /admin/ {
        alias /opt/feigong-yuncan/web/yuncan-admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    location = /admin {
        return 301 /admin/;
    }

    location ^~ /downloads/ {
        alias /opt/feigong-yuncan/downloads/;
        autoindex off;
        add_header Content-Disposition "attachment";
        try_files $uri =404;
    }

    location / {
        root /opt/feigong-yuncan/web/yuncan;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        proxy_pass http://127.0.0.1:3003/api/health;
    }
}
