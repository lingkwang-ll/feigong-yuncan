# 非攻云餐 Nginx 生产路由（Docker 内 nginx 容器）
# 唯一入口 :80
#
# /        → employee-web (Flutter)
# /admin/  → admin-web
# /api/    → backend api:3003
# /uploads/→ backend api:3003

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    access_log /var/log/nginx/feigong-access.log;
    error_log  /var/log/nginx/feigong-error.log warn;

    # ---------- API（反代到 Node 3003） ----------
    location /api/ {
        proxy_pass         http://api:3003/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # ---------- 上传文件 ----------
    location /uploads/ {
        proxy_pass         http://api:3003/uploads/;
        proxy_set_header   Host $host;
    }

    # ---------- admin-web 管理后台 ----------
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    location = /admin {
        return 301 /admin/;
    }

    # ---------- employee-web 员工/商家端（根路径） ----------
    location / {
        root /usr/share/nginx/html/employee;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ---------- 健康检查（可选） ----------
    location = /health {
        proxy_pass http://api:3003/api/health;
        proxy_set_header Host $host;
    }
}
