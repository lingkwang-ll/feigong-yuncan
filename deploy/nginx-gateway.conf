# =============================================================
# 三系统统一入口 Nginx 网关（宿主机 /etc/nginx）
#
# 安装：由 deploy/setup-gateway.sh 或 deploy.sh 自动渲染并 reload
#
# 路由（公网 :80 唯一入口）：
#   /            → 非攻云餐 employee-web
#   /admin/      → 非攻云餐 admin-web
#   /api/        → 非攻云餐 backend @FEIGONG_API_PORT@
#   /uploads/    → 非攻云餐 backend @FEIGONG_API_PORT@
#   /attendance/ → 考勤系统 @ATTENDANCE_UPSTREAM@
#   /pricing/    → 报价系统 @PRICING_UPSTREAM@
#
# 占位符（部署时 sed 替换）：
#   @FEIGONG_RELEASE_ROOT@  静态资源目录
#   @FEIGONG_API_PORT@      云餐 API 端口（默认 3003）
#   @ATTENDANCE_UPSTREAM@   考勤 upstream（默认 127.0.0.1:3001）
#   @PRICING_UPSTREAM@      报价 upstream（默认 127.0.0.1:3002）
# =============================================================

upstream feigong_api {
    server 127.0.0.1:@FEIGONG_API_PORT@;
    keepalive 16;
}

upstream attendance_app {
    server @ATTENDANCE_UPSTREAM@;
    keepalive 8;
}

upstream pricing_app {
    server @PRICING_UPSTREAM@;
    keepalive 8;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 20m;

    access_log /var/log/nginx/unified-gateway-access.log;
    error_log  /var/log/nginx/unified-gateway-error.log warn;

    # ---------- 非攻云餐 API（独立 namespace，优先于 /） ----------
    location /api/ {
        proxy_pass         http://feigong_api/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    location /uploads/ {
        proxy_pass         http://feigong_api/uploads/;
        proxy_set_header   Host $host;
    }

    # ---------- 非攻云餐 admin-web ----------
    location /admin/ {
        alias @FEIGONG_RELEASE_ROOT@/admin-web/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    location = /admin {
        return 301 /admin/;
    }

    # ---------- 考勤系统（保留，路径隔离） ----------
    location /attendance/ {
        proxy_pass         http://attendance_app/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Prefix /attendance;
        proxy_redirect     off;
    }

    location = /attendance {
        return 301 /attendance/;
    }

    # ---------- 报价系统（保留，路径隔离） ----------
    location /pricing/ {
        proxy_pass         http://pricing_app/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Prefix /pricing;
        proxy_redirect     off;
    }

    location = /pricing {
        return 301 /pricing/;
    }

    # ---------- 非攻云餐 employee-web（根路径） ----------
    location / {
        root @FEIGONG_RELEASE_ROOT@/employee-app;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        proxy_pass http://feigong_api/api/health;
        proxy_set_header Host $host;
    }
}
