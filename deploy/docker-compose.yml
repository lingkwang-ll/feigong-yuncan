# 非攻云餐 一键生产部署（Docker Compose）
#
# 用法（在项目根目录）：
#   1. 先执行 deploy/build-release.ps1 或 deploy/build-release.sh 构建前端与后端
#   2. docker compose -f deploy/docker-compose.yml up -d --build
#   3. 访问 http://localhost:8080/          员工/商家端
#      访问 http://localhost:8080/admin/    管理后台
#      API   http://localhost:8080/api/health
#      直连  http://localhost:3000/api/health （可选）

services:
  api:
    build:
      context: ../server
      dockerfile: ../deploy/docker/Dockerfile
    container_name: feigong-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_PATH: /data/feigong-yuncan.db
      UPLOAD_DIR: /uploads
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      JWT_SECRET: ${JWT_SECRET:-feigong-local-dev-secret-change-in-prod}
    volumes:
      - feigong-data:/data
      - feigong-uploads:/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    image: nginx:1.27-alpine
    container_name: feigong-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./release/admin-web:/usr/share/nginx/html/admin:ro
      - ./release/employee-app:/usr/share/nginx/html/employee:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  feigong-data:
  feigong-uploads:
