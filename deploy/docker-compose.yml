# 非攻云餐 生产部署（阿里云 ECS Ubuntu 24.04）
#
# 多系统共存（推荐）：
#   - 宿主机 nginx :80 统一入口（deploy/nginx-gateway.conf）
#   - 本 compose 仅启动 api :3003
#   - 考勤 3001 / 报价 3002 不受影响
#
# 单系统独立模式：
#   docker compose --profile standalone up -d
#
# 用法：
#   cd deploy && ./deploy.sh

name: feigong-yuncan

services:
  api:
    build:
      context: ../server
      dockerfile: ../deploy/docker/Dockerfile
    container_name: feigong-api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_PATH: ${DATABASE_PATH:-/data/feigong.db}
      UPLOAD_DIR: ${UPLOAD_DIR:-/uploads}
    ports:
      - "127.0.0.1:3003:3003"
    volumes:
      - feigong-db:/data
      - feigong-uploads:/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3003/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # 仅 standalone 模式使用（多系统共存时不要启动，避免与宿主机 nginx 抢 80）
  nginx:
    profiles: ["standalone"]
    image: nginx:1.27-alpine
    container_name: feigong-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./release/admin-web:/usr/share/nginx/html/admin:ro
      - ./release/employee-app:/usr/share/nginx/html/employee:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  feigong-db:
  feigong-uploads:
