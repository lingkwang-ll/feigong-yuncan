name: feigong_yuncan
description: "非攻云餐 - 企业内部简易订餐工具"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  http: ^1.2.0
  http_parser: ^4.1.0
  file_picker: ^8.1.7
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

# 正式 UI Logo 以 assets/images/ui/ 下 PNG 为准，勿用 flutter_launcher_icons 覆盖 app_logo_large.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/ui/
    - assets/images/dishes/
    - assets/audio/message.wav
    - assets/audio/new_order.wav
    - assets/audio/message.mp3
    - assets/audio/new_order.mp3
