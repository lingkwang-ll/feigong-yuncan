# =============================================================
# 非攻云餐 Nginx 生产配置
#
# 安装：
#   sudo cp nginx-production.conf /etc/nginx/conf.d/feigong-yuncan.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# 路径约定：
#   /opt/feigong-yuncan/app/      Flutter Web (build/web)
#   /opt/feigong-yuncan/admin/    admin-web (dist)
#   /opt/feigong-yuncan/server/   Node.js 后端
#   /opt/feigong-yuncan/uploads/  上传文件
#   /opt/feigong-yuncan/data/     SQLite
#   /opt/feigong-yuncan/logs/     日志
#
# Flutter Web 构建：
#   flutter build web \
#     --base-href "/app/" \
#     --dart-define=ENV=prod \
#     --dart-define=API_BASE_URL=https://your-domain.com/api
#
# admin-web 构建：
#   cd admin-web && npm run build
#   # .env.production: VITE_API_BASE_URL=https://your-domain.com/api
# =============================================================

server {
    listen       80;
    server_name  your-domain.com;   # 改成实际域名或 _

    client_max_body_size  20m;

    access_log  /opt/feigong-yuncan/logs/nginx-access.log;
    error_log   /opt/feigong-yuncan/logs/nginx-error.log;

    # ---------- Flutter Web 员工/商家端 ----------
    location /app/ {
        alias  /opt/feigong-yuncan/app/;
        index  index.html;
        try_files $uri $uri/ /app/index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ---------- admin-web 管理后台 ----------
    location /admin/ {
        alias  /opt/feigong-yuncan/admin/;
        index  index.html;
        try_files $uri $uri/ /admin/index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ---------- Node.js API 反代 ----------
    location /api/ {
        proxy_pass         http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # ---------- 上传文件直链 ----------
    location /uploads/ {
        alias  /opt/feigong-yuncan/uploads/;
        autoindex off;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # ---------- 健康检查 ----------
    location = /health {
        proxy_pass       http://127.0.0.1:3000/api/health;
        proxy_set_header Host $host;
    }

    # 根路径跳转（可选）
    location = / {
        return 302 /app/;
    }
}

# HTTPS 示例（证书就绪后取消注释并调整 server_name）
