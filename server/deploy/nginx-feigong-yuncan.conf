# =============================================================
# 非攻云餐 Nginx 配置示例（IP 部署，未启用 HTTPS）
#
# 安装位置（CentOS / Ubuntu 通用）：
#   sudo cp nginx-feigong-yuncan.conf  /etc/nginx/conf.d/feigong-yuncan.conf
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# 路径约定（与 DEPLOY.md 保持一致）：
#   /opt/feigong-yuncan/app/         Flutter Web 构建产物 (build/web)
#   /opt/feigong-yuncan/server/      Node.js 后端代码
#   /opt/feigong-yuncan/uploads/     上传文件
#   /opt/feigong-yuncan/data/        SQLite
#   /opt/feigong-yuncan/logs/        日志（包含本 nginx access/error）
#
# 端口：
#   80    Nginx 对外
#   3000  Node.js 后端（仅本机，pm2 拉起）
#
# 前端构建命令（必须显式带上 base href / API 地址）：
#   flutter build web \
#     --base-href "/yuncan/" \
#     --dart-define=API_BASE_URL=http://<服务器IP>/yuncan-api
#
# 然后 rsync / scp build/web 内容到 /opt/feigong-yuncan/app/
# =============================================================

server {
    listen       80;
    server_name  _;            # 先用默认 server 接收所有 IP / Host

    client_max_body_size  20m; # 允许上传付款截图 / 菜品图 / 二维码

    access_log  /opt/feigong-yuncan/logs/nginx-access.log;
    error_log   /opt/feigong-yuncan/logs/nginx-error.log;

    # ---------- 1. Flutter Web 静态资源 ----------
    # 访问入口：http://<服务器IP>/yuncan/
    #
    # 注意：alias + try_files 嵌套 regex location 容易出错，
    # 这里保持单层结构，缓存策略放外层用 map 也可，先用通用 1h。
    location /yuncan/ {
        alias  /opt/feigong-yuncan/app/;
        index  index.html;

        # SPA 路由刷新兜底：找不到文件统一回到 index.html
        try_files $uri $uri/ /yuncan/index.html;

        # 通用静态资源缓存（main.dart.js 等含 hash，可放长缓存）
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # 兼容：访问根 / 时自动跳到 /yuncan/
    location = / {
        return 302 /yuncan/;
    }

    # ---------- 2. 后端 API 反代 ----------
    # 浏览器侧：http://<服务器IP>/yuncan-api/...
    # 真实后端：http://127.0.0.1:3000/api/...
    # 末尾斜杠很关键：尾斜杠 + 尾斜杠 才会做路径替换
    location /yuncan-api/ {
        proxy_pass         http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 上传大文件 / 慢网络保护
        proxy_connect_timeout 30s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # ---------- 3. 上传文件直链 ----------
    # 浏览器侧：http://<服务器IP>/uploads/payments/xxx.png
    # 后端返回的 image / qr URL 也是 /uploads/...
    # 直接 alias 到磁盘目录，性能 > 反代到 Node
    location /uploads/ {
        alias  /opt/feigong-yuncan/uploads/;
        autoindex off;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # ---------- 健康检查（透传后端 health）----------
    # 监控 / 探针访问：http://<服务器IP>/health
    location = /health {
        proxy_pass         http://127.0.0.1:3000/api/health;
        proxy_set_header   Host $host;
    }
}

# =============================================================
# 备用：完全不反代，直接让前端访问 3000 端口
# 适合 Nginx 不熟 / 仅本机 demo 的同事，把上面整段 server 删掉，
# 改成下面这段即可：
#
# server {
#     listen 80;
#     server_name _;
#     location / {
#         alias /opt/feigong-yuncan/app/;
#         try_files $uri $uri/ /index.html;
#     }
# }
#
# 然后前端构建用：
#   flutter build web --dart-define=API_BASE_URL=http://<服务器IP>:3000/api
# 同时安全组放开 3000
# =============================================================
